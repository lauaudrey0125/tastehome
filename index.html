<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TasteHome - 国际美食地图</title>
    <script src="https://webapi.amap.com/maps?v=2.0&key=b0ed148e34bc74e1b2f77fbda7e2926d&plugin=AMap.Scale,AMap.ToolBar"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f8f9fa; }
        header { background: #2c7a4d; color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 70px; }
        .logo { height: 50px; object-fit: contain; }
        .lang-switch { background: white; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 600; color: #2c7a4d; cursor: pointer; }
        main { max-width: 1200px; margin: 16px auto; padding: 0 16px; }
        #map { height: 400px; border-radius: 16px; margin-bottom: 20px; }
        .restaurant-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .restaurant-card:hover { background: #fef7e0; transform: translateY(-2px); }
        .restaurant-name { font-weight: bold; font-size: 1.2rem; color: #1e3a2f; }
        .restaurant-address { font-size: 0.85rem; color: #5a6e5c; margin-top: 4px; }
        .restaurant-meta { font-size: 0.75rem; color: #b86b2c; display: inline-block; background: #fef2e0; padding: 4px 10px; border-radius: 30px; margin-top: 6px; }
        .unlock-btn { background: #ffc107; color: #1e3a2f; border: none; padding: 12px 20px; border-radius: 40px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 24px; border-radius: 28px; max-width: 350px; width: 90%; text-align: center; }
        .qr-box img { width: 200px; margin: 16px auto; }
        .footer { text-align: center; margin: 30px 0 20px; font-size: 12px; color: #8b9a8b; }
    </style>
</head>
<body>
<header>
    <img src="logo-simple.png" alt="TasteHome" class="logo">
    <button id="langBtn" class="lang-switch">中文</button>
</header>
<main>
    <div id="map"></div>
    <div id="restaurantList"></div>
    <div id="unlockArea" style="display: none;"></div>
</main>
<div class="footer">
    <p>📍 Tap any restaurant to see address | 点击餐厅查看详情</p>
</div>

<!-- 支付弹窗 -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Unlock All Restaurants</h3>
        <p id="modalDesc">Pay ¥9.9 to get full access</p>
        <div class="qr-box">
            <div style="font-size:12px; margin-bottom:8px;">👇 Scan to pay ¥9.9 👇</div>
            <img src="收款码.png" alt="QR Code" style="width:100%;">
        </div>
        <button id="confirmPayBtn" style="background:#2c7a4d; color:white; margin:8px;">✓ I have paid / 我已支付</button>
        <button id="closeModalBtn" style="background:#ccc;">Cancel</button>
    </div>
</div>

<script>
    // 餐厅数据（6家）
    const restaurantsData = [
        { id: 1, name_cn: "兰州拉面（仓前店）", name_en: "Lanzhou Noodles (Cangqian)", lat: 30.28621, lng: 120.019159, address_cn: "余杭区仓前街道", address_en: "Cangqian Street", certification_cn: "穆斯林经营", certification_en: "Muslim-owned", rating: 4.3 },
        { id: 2, name_cn: "疆厨子·抓饭·烤肉", name_en: "Jiang Kitchen - Rice & BBQ", lat: 30.274897, lng: 120.021742, address_cn: "余杭区仓前街道", address_en: "Cangqian Street", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.5 },
        { id: 3, name_cn: "SOUQ · 黎巴嫩烤肉(平安悦坊店)", name_en: "SOUQ Lebanese BBQ", lat: 30.251497, lng: 120.212689, address_cn: "平安悦坊", address_en: "Ping'an Yuefang", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.4 },
        { id: 4, name_cn: "Uncle Kosto科斯托·中东菜", name_en: "Uncle Kosto Middle Eastern", lat: 30.313583, lng: 120.392775, address_cn: "中东菜餐厅", address_en: "Middle Eastern Restaurant", certification_cn: "穆斯林经营", certification_en: "Muslim-owned", rating: 4.6 },
        { id: 5, name_cn: "喀摩尔土耳其风味餐厅·中东美食·异域风情(中山中路店)", name_en: "Kamoer Turkish Cuisine", lat: 30.247915, lng: 120.170652, address_cn: "中山中路", address_en: "Zhongshan Middle Road", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.5 },
        { id: 6, name_cn: "halal迪拜土耳其清真餐厅·烧烤.宴会团建(西湖音乐喷泉店)", name_en: "Halal Dubai Turkish BBQ", lat: 30.257386, lng: 120.159474, address_cn: "西湖音乐喷泉", address_en: "West Lake Music Fountain", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.7 }
    ];

    let currentLang = 'en';
    let map = null;
    let markers = [];
    let isPaidUser = localStorage.getItem('tastehome_paid') === 'true';

    function t(zh, en) { return currentLang === 'zh' ? zh : en; }

    function displayRestaurants() {
        const container = document.getElementById('restaurantList');
        const unlockContainer = document.getElementById('unlockArea');
        container.innerHTML = '';
        const displayList = isPaidUser ? restaurantsData : restaurantsData.slice(0, 3);
        displayList.forEach(rest => {
            const card = document.createElement('div');
            card.className = 'restaurant-card';
            const name = currentLang === 'en' ? rest.name_en : rest.name_cn;
            const addr = currentLang === 'en' ? rest.address_en : rest.address_cn;
            const cert = currentLang === 'en' ? rest.certification_en : rest.certification_cn;
            card.innerHTML = `
                <div class="restaurant-name">${name} ⭐ ${rest.rating}</div>
                <div class="restaurant-address">📍 ${addr}</div>
                <div class="restaurant-meta">✅ ${cert}</div>
            `;
            card.onclick = () => alert(`${name}\n📍 ${addr}\n⭐ ${rest.rating}`);
            container.appendChild(card);
        });
        if (!isPaidUser && restaurantsData.length > 3) {
            unlockContainer.innerHTML = `<button class="unlock-btn" onclick="showPaymentModal()">${currentLang === 'en' ? '🔓 Unlock All Restaurants (¥9.9)' : '🔓 解锁全部餐厅 (¥9.9)'}</button>`;
            unlockContainer.style.display = 'block';
        } else {
            unlockContainer.style.display = 'none';
        }
    }

    function updateMapMarkers() {
        if (!map) return;
        markers.forEach(m => m.setMap(null));
        markers = [];
        const displayList = isPaidUser ? restaurantsData : restaurantsData.slice(0, 3);
        displayList.forEach(rest => {
            const title = currentLang === 'en' ? rest.name_en : rest.name_cn;
            const marker = new AMap.Marker({
                position: [rest.lng, rest.lat],
                map: map,
                title: title
            });
            marker.on('click', () => alert(`${title}\n📍 ${currentLang === 'en' ? rest.address_en : rest.address_cn}`));
            markers.push(marker);
        });
        if (markers.length) map.setFitView(markers);
    }

    function showPaymentModal() {
        document.getElementById('paymentModal').style.display = 'flex';
    }
    function closePaymentModal() {
        document.getElementById('paymentModal').style.display = 'none';
    }
    function confirmPayment() {
        isPaidUser = true;
        localStorage.setItem('tastehome_paid', 'true');
        closePaymentModal();
        displayRestaurants();
        updateMapMarkers();
        alert(currentLang === 'en' ? '✓ Payment confirmed! All restaurants unlocked.' : '✓ 支付已确认！已解锁全部餐厅。');
    }

    function initMap() {
        map = new AMap.Map('map', {
            center: [120.016255, 30.292797],
            zoom: 13,
            viewMode: '2D',
            mapStyle: 'amap://styles/whitesmoke'
        });
        map.addControl(new AMap.Scale());
        map.addControl(new AMap.ToolBar());
        updateMapMarkers();
    }

    window.onload = () => {
        initMap();
        displayRestaurants();
        document.getElementById('langBtn').onclick = () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'English' : '中文';
            document.getElementById('modalTitle').innerText = currentLang === 'en' ? 'Unlock All Restaurants' : '解锁全部餐厅';
            document.getElementById('modalDesc').innerText = currentLang === 'en' ? 'Pay ¥9.9 to get full access' : '支付 ¥9.9 解锁全部清真餐厅';
            displayRestaurants();
            updateMapMarkers();
        };
        document.getElementById('confirmPayBtn').onclick = confirmPayment;
        document.getElementById('closeModalBtn').onclick = closePaymentModal;
    };
</script>
</body>
</html>
