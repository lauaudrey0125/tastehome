<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TasteHome - 国际美食地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; }
        header { background: #2c7a4d; color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 70px; gap: 10px; }
        .logo { height: 100%; max-height: 60px; object-fit: contain; }
        .lang-switch, .user-btn { background: white; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 600; color: #2c7a4d; cursor: pointer; }
        .user-btn { background: #ffc107; color: #1e3a2f; }
        main { max-width: 1200px; margin: 16px auto; padding: 0 16px; }
        #map { height: 400px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .search-filter { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-filter input, .search-filter select { padding: 8px 12px; border-radius: 30px; border: 1px solid #ddd; flex: 1; }
        .restaurant-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .restaurant-card:hover { background: #fef7e0; transform: translateY(-2px); }
        .restaurant-info { flex: 1; }
        .restaurant-name { font-weight: 700; font-size: 1.2rem; color: #1e3a2f; }
        .restaurant-address { font-size: 0.85rem; color: #5a6e5c; margin-top: 4px; }
        .restaurant-meta { font-size: 0.75rem; color: #b86b2c; display: inline-block; background: #fef2e0; padding: 4px 10px; border-radius: 30px; margin-top: 6px; }
        .favorite-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #ccc; }
        .favorite-btn.active { color: #e74c3c; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 24px; border-radius: 28px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .footer { text-align: center; margin: 30px 0 20px; font-size: 12px; color: #8b9a8b; }
        @media (max-width: 600px) { #map { height: 300px; } header { height: 60px; } }
    </style>
    <!-- 高德地图 API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=b0ed148e34bc74e1b2f77fbda7e2926d&plugin=AMap.Scale,AMap.ToolBar"></script>
</head>
<body>
<header>
    <img src="logo-simple.png" alt="TasteHome" class="logo">
    <div>
        <button id="langBtn" class="lang-switch">中文</button>
        <button id="userBtn" class="user-btn">登录</button>
    </div>
</header>
<main>
    <div id="map"></div>
    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="搜索餐厅..." style="background:white;">
        <select id="certFilter">
            <option value="">所有认证</option>
            <option value="穆斯林经营">穆斯林经营</option>
            <option value="清真认证">清真认证</option>
        </select>
    </div>
    <div id="restaurantList"></div>
</main>
<div class="footer">
    <p>📍 点击餐厅查看详情 | 登录后可以收藏、评价</p>
</div>

<!-- 登录/注册弹窗 -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 id="authTitle">登录</h3>
        <input type="email" id="email" placeholder="邮箱" style="width:100%; margin:10px 0; padding:8px;">
        <input type="password" id="password" placeholder="密码" style="width:100%; margin:10px 0; padding:8px;">
        <button id="authSubmitBtn" style="background:#2c7a4d; color:white; padding:8px 16px; border:none; border-radius:30px; margin:5px;">登录</button>
        <button id="toggleAuthBtn" style="background:#ccc; border:none; padding:8px 16px; border-radius:30px;">没有账号？注册</button>
        <button id="closeAuthBtn" style="background:#ccc; border:none; padding:8px 16px; border-radius:30px;">关闭</button>
    </div>
</div>

<!-- 餐厅详情弹窗 -->
<div id="detailModal" class="modal">
    <div class="modal-content" id="detailContent"></div>
</div>

<script>
    // ==================== 餐厅数据（共6家）====================
    const restaurantsData = [
        { id: 1, name_cn: "兰州拉面（仓前店）", name_en: "Lanzhou Noodles (Cangqian)", lat: 30.28621, lng: 120.019159, address_cn: "余杭区仓前街道", address_en: "Cangqian Street", certification_cn: "穆斯林经营", certification_en: "Muslim-owned", rating: 4.3 },
        { id: 2, name_cn: "疆厨子·抓饭·烤肉", name_en: "Jiang Kitchen - Rice & BBQ", lat: 30.274897, lng: 120.021742, address_cn: "余杭区仓前街道", address_en: "Cangqian Street", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.5 },
        { id: 3, name_cn: "SOUQ · 黎巴嫩烤肉(平安悦坊店)", name_en: "SOUQ Lebanese BBQ", lat: 30.251497, lng: 120.212689, address_cn: "平安悦坊", address_en: "Ping'an Yuefang", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.4 },
        { id: 4, name_cn: "Uncle Kosto科斯托·中东菜", name_en: "Uncle Kosto Middle Eastern", lat: 30.313583, lng: 120.392775, address_cn: "中东菜餐厅", address_en: "Middle Eastern Restaurant", certification_cn: "穆斯林经营", certification_en: "Muslim-owned", rating: 4.6 },
        { id: 5, name_cn: "喀摩尔土耳其风味餐厅·中东美食·异域风情(中山中路店)", name_en: "Kamoer Turkish Cuisine", lat: 30.247915, lng: 120.170652, address_cn: "中山中路", address_en: "Zhongshan Middle Road", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.5 },
        { id: 6, name_cn: "halal迪拜土耳其清真餐厅·烧烤.宴会团建(西湖音乐喷泉店)", name_en: "Halal Dubai Turkish BBQ", lat: 30.257386, lng: 120.159474, address_cn: "西湖音乐喷泉", address_en: "West Lake Music Fountain", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.7 }
    ];

    let currentLang = 'en';
    let map = null;
    let markers = [];
    let currentUser = null;   // 模拟登录用户，实际可用 localStorage 保存状态
    let favorites = new Set(); // 存储收藏的餐厅id

    // 本地存储模拟登录和收藏（不依赖 Firebase，纯前端演示）
    function loadFromLocal() {
        const savedUser = localStorage.getItem('tastehome_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('userBtn').textContent = currentUser.email.split('@')[0];
        }
        const savedFav = localStorage.getItem('tastehome_favorites');
        if (savedFav) {
            favorites = new Set(JSON.parse(savedFav));
        }
        displayRestaurants();
        updateMapMarkers();
    }
    function saveFavorites() {
        localStorage.setItem('tastehome_favorites', JSON.stringify([...favorites]));
    }

    function t(zh, en) { return currentLang === 'zh' ? zh : en; }

    function displayRestaurants() {
        const container = document.getElementById('restaurantList');
        if (!container) return;
        container.innerHTML = '';
        let filtered = [...restaurantsData];
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        if (keyword) {
            filtered = filtered.filter(r => r.name_cn.includes(keyword) || r.name_en.toLowerCase().includes(keyword));
        }
        const cert = document.getElementById('certFilter').value;
        if (cert) {
            filtered = filtered.filter(r => r.certification_cn === cert);
        }
        // 免费版显示前3家，付费用户显示全部（这里简单模拟：登录即付费）
        const displayList = currentUser ? filtered : filtered.slice(0, 3);
        displayList.forEach(rest => {
            const card = document.createElement('div');
            card.className = 'restaurant-card';
            const name = currentLang === 'en' ? rest.name_en : rest.name_cn;
            const addr = currentLang === 'en' ? rest.address_en : rest.address_cn;
            const certText = currentLang === 'en' ? rest.certification_en : rest.certification_cn;
            card.innerHTML = `
                <div class="restaurant-info">
                    <div class="restaurant-name">${name} ⭐ ${rest.rating}</div>
                    <div class="restaurant-address">📍 ${addr}</div>
                    <div class="restaurant-meta">✅ ${certText}</div>
                </div>
                <button class="favorite-btn ${favorites.has(rest.id) ? 'active' : ''}" data-id="${rest.id}">❤️</button>
            `;
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('favorite-btn')) return;
                showRestaurantDetail(rest);
            });
            const favBtn = card.querySelector('.favorite-btn');
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!currentUser) { alert('请先登录'); showAuthModal(); return; }
                const id = rest.id;
                if (favorites.has(id)) {
                    favorites.delete(id);
                    favBtn.classList.remove('active');
                } else {
                    favorites.add(id);
                    favBtn.classList.add('active');
                }
                saveFavorites();
            });
            container.appendChild(card);
        });
    }

    function updateMapMarkers() {
        if (!map) return;
        markers.forEach(m => m.setMap(null));
        markers = [];
        const displayList = currentUser ? restaurantsData : restaurantsData.slice(0, 3);
        displayList.forEach(rest => {
            const marker = new AMap.Marker({
                position: [rest.lng, rest.lat],
                map: map,
                title: currentLang === 'en' ? rest.name_en : rest.name_cn,
            });
            marker.on('click', () => showRestaurantDetail(rest));
            markers.push(marker);
        });
        if (markers.length) map.setFitView(markers);
    }

    function showRestaurantDetail(rest) {
        const detailContent = document.getElementById('detailContent');
        detailContent.innerHTML = `
            <h3>${currentLang === 'en' ? rest.name_en : rest.name_cn}</h3>
            <p>📍 ${currentLang === 'en' ? rest.address_en : rest.address_cn}</p>
            <p>✅ ${currentLang === 'en' ? rest.certification_en : rest.certification_cn}</p>
            <p>⭐ ${rest.rating}</p>
            <button id="navBtn" style="background:#2c7a4d; color:white; border:none; padding:8px 16px; border-radius:30px; margin:5px;">🧭 导航</button>
            <button id="helpBtn" style="background:#ffc107; border:none; padding:8px 16px; border-radius:30px;">🙋 求带</button>
            <hr>
            <h4>📝 用户评价</h4>
            <div id="reviewsList"><p>暂无评价，快来发表你的体验吧！</p></div>
            ${currentUser ? `<textarea id="reviewText" placeholder="写下你的评价..." rows="2" style="width:100%; margin:10px 0;"></textarea>
            <select id="reviewRating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select>
            <button id="submitReview" style="background:#2c7a4d; color:white; border:none; padding:8px 16px; border-radius:30px;">发表评价</button>` : '<p><a href="#" id="loginToReview">登录后发表评价</a></p>'}
            <button id="closeDetail" style="background:#ccc; border:none; padding:8px 16px; border-radius:30px; margin-top:10px;">关闭</button>
        `;
        document.getElementById('detailModal').style.display = 'flex';
        document.getElementById('navBtn').onclick = () => {
            window.open(`https://uri.amap.com/marker?position=${rest.lng},${rest.lat}&name=${encodeURIComponent(rest.name_cn)}`);
        };
        document.getElementById('helpBtn').onclick = () => {
            alert('中外互助功能即将上线，你可以发布“求带”需求，本地志愿者会陪你一起去餐厅！');
        };
        if (currentUser) {
            document.getElementById('submitReview').onclick = () => {
                const text = document.getElementById('reviewText').value;
                if (!text) return alert('请输入评价内容');
                alert('评价已提交（演示版）');
                document.getElementById('detailModal').style.display = 'none';
            };
        } else {
            const loginLink = document.getElementById('loginToReview');
            if (loginLink) loginLink.onclick = (e) => { e.preventDefault(); showAuthModal(); document.getElementById('detailModal').style.display = 'none'; };
        }
        document.getElementById('closeDetail').onclick = () => document.getElementById('detailModal').style.display = 'none';
    }

    function showAuthModal() {
        document.getElementById('authModal').style.display = 'flex';
    }

    // 初始化地图
    function initMap() {
        map = new AMap.Map('map', {
            center: [120.016255, 30.292797],
            zoom: 13,
            viewMode: '2D',
            mapStyle: 'amap://styles/whitesmoke'
        });
        map.addControl(new AMap.Scale());
        map.addControl(new AMap.ToolBar());
        updateMapMarkers();
    }

    // 页面加载
    window.onload = () => {
        loadFromLocal();
        initMap();

        // 语言切换
        document.getElementById('langBtn').onclick = () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'English' : '中文';
            displayRestaurants();
            updateMapMarkers();
        };
        // 用户按钮
        document.getElementById('userBtn').onclick = () => {
            if (currentUser) {
                if (confirm('是否退出登录？')) {
                    localStorage.removeItem('tastehome_user');
                    localStorage.removeItem('tastehome_favorites');
                    currentUser = null;
                    favorites.clear();
                    document.getElementById('userBtn').textContent = '登录';
                    displayRestaurants();
                    updateMapMarkers();
                }
            } else {
                showAuthModal();
            }
        };
        // 搜索筛选
        document.getElementById('searchInput').oninput = () => displayRestaurants();
        document.getElementById('certFilter').onchange = () => displayRestaurants();

        // 登录弹窗逻辑
        const authModal = document.getElementById('authModal');
        let isLogin = true;
        document.getElementById('toggleAuthBtn').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('authTitle').textContent = isLogin ? '登录' : '注册';
            document.getElementById('authSubmitBtn').textContent = isLogin ? '登录' : '注册';
            document.getElementById('toggleAuthBtn').textContent = isLogin ? '没有账号？注册' : '已有账号？登录';
        };
        document.getElementById('authSubmitBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            if (!email || !pwd) { alert('请输入邮箱和密码'); return; }
            if (!isLogin && pwd.length < 6) { alert('密码至少6位'); return; }
            // 模拟登录/注册：保存用户信息到本地
            currentUser = { email: email };
            localStorage.setItem('tastehome_user', JSON.stringify(currentUser));
            document.getElementById('userBtn').textContent = email.split('@')[0];
            authModal.style.display = 'none';
            displayRestaurants();
            updateMapMarkers();
            alert(isLogin ? '登录成功！' : '注册成功！已自动登录');
        };
        document.getElementById('closeAuthBtn').onclick = () => authModal.style.display = 'none';
        // 点击模态框背景关闭
        window.onclick = (e) => {
            if (e.target === authModal) authModal.style.display = 'none';
            if (e.target === document.getElementById('detailModal')) document.getElementById('detailModal').style.display = 'none';
        };
    };
</script>
</body>
</html>
