<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TasteHome - 国际美食地图</title>
    <!-- Firebase SDK -->
    <script type="module">
        // 在这里粘贴你的 firebaseConfig（从 Firebase 控制台复制）
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // 初始化 Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // 匿名登录，让每个用户有唯一ID，无需注册（简化操作）
        signInAnonymously(auth).catch(error => console.error("匿名登录失败", error));
        
        window.db = db;
        window.auth = auth;
    </script>
    <!-- 高德地图 API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=b0ed148e34bc74e1b2f77fbda7e2926d&plugin=AMap.Scale,AMap.ToolBar"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; }
        header { background: #2c7a4d; color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 70px; gap: 10px; }
        .logo { height: 100%; max-height: 60px; object-fit: contain; }
        .lang-switch { background: white; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 600; color: #2c7a4d; cursor: pointer; }
        main { max-width: 1200px; margin: 16px auto; padding: 0 16px; }
        #map { height: 400px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .search-filter { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-filter input, .search-filter select { padding: 8px 12px; border-radius: 30px; border: 1px solid #ddd; flex: 1; }
        .restaurant-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .restaurant-card:hover { background: #fef7e0; transform: translateY(-2px); }
        .restaurant-info { flex: 1; }
        .restaurant-name { font-weight: 700; font-size: 1.2rem; color: #1e3a2f; }
        .restaurant-address { font-size: 0.85rem; color: #5a6e5c; margin-top: 4px; }
        .restaurant-meta { font-size: 0.75rem; color: #b86b2c; display: inline-block; background: #fef2e0; padding: 4px 10px; border-radius: 30px; margin-top: 6px; }
        .favorite-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #ccc; }
        .favorite-btn.active { color: #e74c3c; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 24px; border-radius: 28px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .review-item { border-bottom: 1px solid #eee; padding: 12px 0; }
        .review-user { font-weight: bold; }
        .review-rating { color: #ffc107; }
        .review-text { margin-top: 6px; color: #333; }
        .review-time { font-size: 0.7rem; color: #999; margin-top: 4px; }
        button { background: #2c7a4d; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin: 5px; }
        .footer { text-align: center; margin: 30px 0 20px; font-size: 12px; color: #8b9a8b; }
        @media (max-width: 600px) { #map { height: 300px; } header { height: 60px; } }
    </style>
</head>
<body>
<header>
    <img src="logo-simple.png" alt="TasteHome" class="logo">
    <button id="langBtn" class="lang-switch">中文</button>
</header>
<main>
    <div id="map"></div>
    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="搜索餐厅...">
        <select id="certFilter">
            <option value="">所有认证</option>
            <option value="穆斯林经营">穆斯林经营</option>
            <option value="清真认证">清真认证</option>
        </select>
    </div>
    <div id="restaurantList"></div>
</main>
<div class="footer">
    <p>📍 点击餐厅查看详情、发表评价 | 所有人可见</p>
</div>

<!-- 餐厅详情弹窗 -->
<div id="detailModal" class="modal">
    <div class="modal-content" id="detailContent"></div>
</div>

<script>
    // 餐厅数据（6家）
    const restaurantsData = [
        { id: 1, name_cn: "兰州拉面（仓前店）", name_en: "Lanzhou Noodles (Cangqian)", lat: 30.28621, lng: 120.019159, address_cn: "余杭区仓前街道", address_en: "Cangqian Street", certification_cn: "穆斯林经营", certification_en: "Muslim-owned", rating: 4.3 },
        { id: 2, name_cn: "疆厨子·抓饭·烤肉", name_en: "Jiang Kitchen - Rice & BBQ", lat: 30.274897, lng: 120.021742, address_cn: "余杭区仓前街道", address_en: "Cangqian Street", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.5 },
        { id: 3, name_cn: "SOUQ · 黎巴嫩烤肉(平安悦坊店)", name_en: "SOUQ Lebanese BBQ", lat: 30.251497, lng: 120.212689, address_cn: "平安悦坊", address_en: "Ping'an Yuefang", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.4 },
        { id: 4, name_cn: "Uncle Kosto科斯托·中东菜", name_en: "Uncle Kosto Middle Eastern", lat: 30.313583, lng: 120.392775, address_cn: "中东菜餐厅", address_en: "Middle Eastern Restaurant", certification_cn: "穆斯林经营", certification_en: "Muslim-owned", rating: 4.6 },
        { id: 5, name_cn: "喀摩尔土耳其风味餐厅·中东美食·异域风情(中山中路店)", name_en: "Kamoer Turkish Cuisine", lat: 30.247915, lng: 120.170652, address_cn: "中山中路", address_en: "Zhongshan Middle Road", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.5 },
        { id: 6, name_cn: "halal迪拜土耳其清真餐厅·烧烤.宴会团建(西湖音乐喷泉店)", name_en: "Halal Dubai Turkish BBQ", lat: 30.257386, lng: 120.159474, address_cn: "西湖音乐喷泉", address_en: "West Lake Music Fountain", certification_cn: "清真认证", certification_en: "Halal Certified", rating: 4.7 }
    ];

    let currentLang = 'en';
    let map = null;
    let markers = [];
    let currentUserId = null;

    // 辅助函数
    function t(zh, en) { return currentLang === 'zh' ? zh : en; }

    // 显示餐厅列表
    function displayRestaurants() {
        const container = document.getElementById('restaurantList');
        container.innerHTML = '';
        let filtered = [...restaurantsData];
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        if (keyword) filtered = filtered.filter(r => r.name_cn.includes(keyword) || r.name_en.toLowerCase().includes(keyword));
        const cert = document.getElementById('certFilter').value;
        if (cert) filtered = filtered.filter(r => r.certification_cn === cert);
        // 免费版显示前3家，为演示，我们全部显示（因为还没做付费）
        const displayList = filtered;
        displayList.forEach(rest => {
            const card = document.createElement('div');
            card.className = 'restaurant-card';
            const name = currentLang === 'en' ? rest.name_en : rest.name_cn;
            const addr = currentLang === 'en' ? rest.address_en : rest.address_cn;
            const certText = currentLang === 'en' ? rest.certification_en : rest.certification_cn;
            card.innerHTML = `
                <div class="restaurant-info">
                    <div class="restaurant-name">${name} ⭐ ${rest.rating}</div>
                    <div class="restaurant-address">📍 ${addr}</div>
                    <div class="restaurant-meta">✅ ${certText}</div>
                </div>
            `;
            card.onclick = () => showRestaurantDetail(rest);
            container.appendChild(card);
        });
    }

    // 更新地图标记
    function updateMapMarkers() {
        if (!map) return;
        markers.forEach(m => m.setMap(null));
        markers = [];
        restaurantsData.forEach(rest => {
            const marker = new AMap.Marker({
                position: [rest.lng, rest.lat],
                map: map,
                title: currentLang === 'en' ? rest.name_en : rest.name_cn,
            });
            marker.on('click', () => showRestaurantDetail(rest));
            markers.push(marker);
        });
        if (markers.length) map.setFitView(markers);
    }

    // 显示餐厅详情并加载评价
    async function showRestaurantDetail(rest) {
        const detailContent = document.getElementById('detailContent');
        detailContent.innerHTML = `<div style="text-align:center">加载中...</div>`;
        document.getElementById('detailModal').style.display = 'flex';
        
        // 从 Firestore 读取该餐厅的评价
        const reviewsRef = collection(window.db, `restaurants/${rest.id}/reviews`);
        const q = query(reviewsRef, orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);
        let reviewsHtml = '';
        snapshot.forEach(doc => {
            const rev = doc.data();
            const stars = '★'.repeat(rev.rating) + '☆'.repeat(5-rev.rating);
            reviewsHtml += `
                <div class="review-item">
                    <div class="review-user">${rev.userName || '匿名用户'}</div>
                    <div class="review-rating">${stars}</div>
                    <div class="review-text">${rev.text}</div>
                    <div class="review-time">${new Date(rev.createdAt).toLocaleString()}</div>
                </div>
            `;
        });
        if (!reviewsHtml) reviewsHtml = '<p>暂无评价，快来发表第一条评价吧！</p>';
        
        const name = currentLang === 'en' ? rest.name_en : rest.name_cn;
        const addr = currentLang === 'en' ? rest.address_en : rest.address_cn;
        const cert = currentLang === 'en' ? rest.certification_en : rest.certification_cn;
        
        detailContent.innerHTML = `
            <h3>${name}</h3>
            <p>📍 ${addr}</p>
            <p>✅ ${cert}</p>
            <p>⭐ ${rest.rating}</p>
            <button id="navBtn">🧭 导航</button>
            <hr>
            <h4>📝 用户评价（${snapshot.size}条）</h4>
            <div id="reviewsList">${reviewsHtml}</div>
            <div style="margin-top:16px;">
                <textarea id="newReview" rows="2" placeholder="写下你的评价..." style="width:100%; padding:8px; border-radius:12px; border:1px solid #ddd;"></textarea>
                <div>
                    <span>评分：</span>
                    <select id="reviewRating">
                        <option value="5">⭐⭐⭐⭐⭐ 5星</option>
                        <option value="4">⭐⭐⭐⭐ 4星</option>
                        <option value="3">⭐⭐⭐ 3星</option>
                        <option value="2">⭐⭐ 2星</option>
                        <option value="1">⭐ 1星</option>
                    </select>
                </div>
                <button id="submitReviewBtn">发表评价</button>
            </div>
            <button id="closeDetail">关闭</button>
        `;
        
        document.getElementById('navBtn').onclick = () => {
            window.open(`https://uri.amap.com/marker?position=${rest.lng},${rest.lat}&name=${encodeURIComponent(rest.name_cn)}`);
        };
        document.getElementById('submitReviewBtn').onclick = async () => {
            const text = document.getElementById('newReview').value.trim();
            const rating = parseInt(document.getElementById('reviewRating').value);
            if (!text) { alert('请填写评价内容'); return; }
            // 获取当前匿名用户的ID
            const userId = localStorage.getItem('anonymousId') || 'user_' + Math.random().toString(36).substr(2, 8);
            if (!localStorage.getItem('anonymousId')) localStorage.setItem('anonymousId', userId);
            const userName = `美食家_${userId.substr(-4)}`; // 简单匿名显示
            await addDoc(collection(window.db, `restaurants/${rest.id}/reviews`), {
                text: text,
                rating: rating,
                userName: userName,
                createdAt: new Date()
            });
            alert('评价已提交，感谢分享！');
            // 重新加载详情页以显示新评价
            showRestaurantDetail(rest);
        };
        document.getElementById('closeDetail').onclick = () => document.getElementById('detailModal').style.display = 'none';
    }

    // 初始化地图
    function initMap() {
        map = new AMap.Map('map', {
            center: [120.016255, 30.292797],
            zoom: 13,
            viewMode: '2D',
            mapStyle: 'amap://styles/whitesmoke'
        });
        map.addControl(new AMap.Scale());
        map.addControl(new AMap.ToolBar());
        updateMapMarkers();
    }

    // 等待 Firebase 初始化完成后再加载
    window.onload = () => {
        displayRestaurants();
        initMap();
        document.getElementById('langBtn').onclick = () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'English' : '中文';
            displayRestaurants();
            updateMapMarkers();
        };
        document.getElementById('searchInput').oninput = () => displayRestaurants();
        document.getElementById('certFilter').onchange = () => displayRestaurants();
        // 关闭模态框背景点击
        window.onclick = (e) => {
            const modal = document.getElementById('detailModal');
            if (e.target === modal) modal.style.display = 'none';
        };
    };
</script>
</body>
</html>
