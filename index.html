<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteHome - 清真美食地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
        #map { height: 400px; width: 100%; border-radius: 16px; margin-bottom: 20px; }
        .restaurant-card { background: white; padding: 16px; margin-bottom: 12px; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .restaurant-name { font-size: 1.2rem; font-weight: bold; }
    </style>
    <script src="https://webapi.amap.com/maps?v=2.0&key=b0ed148e34bc74e1b2f77fbda7e2926d"></script>
</head>
<body>
    <h1>🍽️ TasteHome</h1>
    <div id="map"></div>
    <div id="restaurantList"></div>

    <script>
        const restaurants = [
            { name: "兰州拉面（仓前店）", lat: 30.28621, lng: 120.019159, addr: "余杭区仓前街道" },
            { name: "疆厨子·抓饭·烤肉", lat: 30.274897, lng: 120.021742, addr: "余杭区仓前街道" },
            { name: "SOUQ黎巴嫩烤肉", lat: 30.251497, lng: 120.212689, addr: "平安悦坊" }
        ];

        let map = new AMap.Map('map', { center: [120.016255, 30.292797], zoom: 13 });
        const listDiv = document.getElementById('restaurantList');
        restaurants.forEach(r => {
            new AMap.Marker({ position: [r.lng, r.lat], map: map, title: r.name });
            const card = document.createElement('div');
            card.className = 'restaurant-card';
            card.innerHTML = `<div class="restaurant-name">${r.name}</div><div>📍 ${r.addr}</div>`;
            listDiv.appendChild(card);
        });
    </script>
</body>
</html>
