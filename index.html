<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TasteHome - Halal Food Finder</title>

<script src="https://webapi.amap.com/maps?v=2.0&key=b0ed148e34bc74e1b2f77fbda7e2926d"></script>

<style>
body { font-family: Arial; margin:0; background:#f8f9fa; }

/* Header */
header {
    background:#2c7a4d;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

button { cursor:pointer; }

/* Search */
.search-bar {
    margin:20px;
    display:flex;
    gap:10px;
}

.search-bar input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}

/* Map */
#map {
    height:300px;
    margin:20px;
    border-radius:20px;
}

/* Card */
.card {
    background:white;
    margin:15px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.tag {
    background:#fef2e0;
    padding:5px 10px;
    border-radius:20px;
    display:inline-block;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
    <h2>TasteHome 🕌</h2>
    <div>
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('zh')">中</button>
        <button onclick="setLang('ar')">AR</button>
    </div>
</header>

<div class="search-bar">
    <input id="searchInput" placeholder="Search halal food...">
    <button onclick="search()">🔍</button>
</div>

<div id="map"></div>

<div id="list"></div>

<script>

// 🌍 Language
let lang = "en";

const text = {
    en: {search:"Search halal food..."},
    zh: {search:"搜索清真餐厅"},
    ar: {search:"ابحث عن طعام حلال"}
};

// 🍜 Data
const data = [
    {name_en:"Lanzhou Noodles", name_zh:"兰州拉面", name_ar:"لانزو نودلز", lat:30.28, lng:120.02, halal:"Muslim-owned"},
    {name_en:"Turkish Kebab", name_zh:"土耳其烤肉", name_ar:"كباب تركي", lat:30.25, lng:120.21, halal:"Halal Certified"}
];

let map = new AMap.Map('map', {
    zoom:12,
    center:[120.02,30.28]
});

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(r=>{
        const name = r["name_"+lang];

        const div = document.createElement("div");
        div.className="card";
        div.innerHTML = `
            <h3>${name}</h3>
            ⭐ 4.5
            <div class="tag">${r.halal}</div>
        `;
        list.appendChild(div);

        new AMap.Marker({
            position:[r.lng, r.lat],
            map:map,
            title:name
        });
    });
}

function setLang(l){
    lang = l;
    document.getElementById("searchInput").placeholder = text[l].search;
    render();
}

function search(){
    alert("Search coming soon (for competition demo)");
}

render();

</script>

</body>
</html>
